## Examples

### Minimal Valid Agent

```yaml
---
name: Example Agent
description: Brief description of purpose
tools: [search, web/fetch, agent]
agents: ["Lint Agent"]
target: vscode
handoffs:
  - label: Next Step
    agent: Lint Agent
    prompt: "Context for next agent."
    send: false
---

# 📋 Example Agent Instructions

**Agent Responsibility**: Do something specific and
well-defined.

**Activation Triggers**: When user requests X
**Execution Model**: Entry point or Parallel/Sequential

---

## 🚀 QUICK START - DO THIS NOW

### 1. Do first thing
```bash
command
```

### 2. Verify
```bash
command
```

### 3. Confirm
```bash
command
```
```

### Complex Agent (with multiple patterns)

```yaml
---
name: Complex Agent
description: Multi-step analysis with optional deep-dives
tools: [search, web/fetch, agent]
agents:
  ["Lint Agent", "Test Agent", "Architecture Agent",
   "Performance Agent", "Documentation Agent"]
target: vscode
handoffs:
  # Sequential gate
  - label: Lint Validation
    agent: Lint Agent
    prompt: "Validate the code changes."
    send: false

  # Optional deep-dives (parallel)
  - label: Architecture Analysis (Optional)
    agent: Architecture Agent
    prompt: "Deep-dive into module structure."
    send: false

  - label: Performance Analysis (Optional)
    agent: Performance Agent
    prompt: "Analyze bundle and rendering performance."
    send: false

  # Documentation
  - label: Update Documentation
    agent: Documentation Agent
    prompt: "Document the changes."
    send: false
---
```

---

## Migration Guide

### From Old Format (if any)

If migrating agents to this schema:

1. Add/update frontmatter fields
2. Ensure all agents in `agents` list are referenced in handoffs
3. Verify handoff labels follow pattern convention
4. Add execution model statement
5. Ensure QUICK START exists
6. Test all handoff references work
